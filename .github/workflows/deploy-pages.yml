name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/beautiful-darwin-bt564v
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Automatically enable GitHub Pages (source = GitHub Actions) if not already enabled
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The static site lives in the Serve/ directory (index.html is the entry point)
          path: ./Serve

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
