name: Deploy protected site to GitHub Pages

# Publishes the password-protected (AES-encrypted) build in /docs.
# The /docs folder contains ONLY encrypted output — no plaintext, no password.
# Access password is entered by the visitor in the browser (StatiCrypt gate).
#
# NOTE: This repository is PRIVATE on a plan that does not include GitHub Pages,
# so this workflow cannot publish from here (it will fail with "Resource not
# accessible by integration"). It is kept as manual-only for the case where the
# account is later upgraded to GitHub Pro/Team (Pages for private repos).
# The site is currently hosted from a separate PUBLIC repo — see README.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload encrypted site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
